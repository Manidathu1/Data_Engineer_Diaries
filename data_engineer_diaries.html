<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Data Engineer Diaries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#F4F2EC;
    --muted:rgba(244,242,236,0.62);
    --glass:rgba(255,255,255,0.07);
    --glass-strong:rgba(255,255,255,0.12);
    --glass-border:rgba(255,255,255,0.16);
    --accent:#F2B84B;
    --accent-2:#6FE7C0;
    --danger:#FF9A8A;
    --radius:18px;
  }

  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }

  body{
    min-height:100vh;
    color:var(--ink);
    font-family:'Inter', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
    background:
      radial-gradient(circle at 12% 18%, rgba(111,231,192,0.22), transparent 42%),
      radial-gradient(circle at 88% 12%, rgba(242,184,75,0.20), transparent 45%),
      radial-gradient(circle at 55% 92%, rgba(108,99,255,0.24), transparent 48%),
      linear-gradient(160deg, #0A2A38 0%, #12203A 48%, #1B1440 100%);
    background-attachment:fixed;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; transition-duration:0.01ms !important; }
  }

  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:56px 24px 100px;
  }

  a{ color:inherit; }

  /* ---------- Stacked list ---------- */
  .bento{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom:14px;
  }

  .cell{
    background:var(--glass);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);
    box-shadow:0 8px 32px rgba(4,10,20,0.28);
    border-radius:var(--radius);
    padding:24px;
    overflow:hidden;
    position:relative;
    animation:fadeIn .35s ease both;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
  }

  .cell.-header{
    background:var(--glass-strong);
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .cell.-stat{
    display:flex;
    flex-direction:row;
    align-items:center;
    justify-content:space-between;
  }
  .cell.-stat > div{ display:flex; align-items:baseline; gap:8px; }
  .cell.-add{
    border-style:dashed;
    background:rgba(255,255,255,0.03);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    padding:18px;
  }
  .cell.-add:hover{ border-color:var(--accent-2); background:var(--glass); }
  .cell.-add:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .cell.-entry{
    display:flex;
    flex-direction:column;
  }
  .cell.-entry:hover{ border-color:var(--accent-2); transform:translateY(-2px); }

  .wordmark{
    font-family:'Source Serif 4', serif;
    font-weight:700;
    font-size:26px;
    letter-spacing:-0.01em;
    margin:0 0 8px;
    line-height:1.15;
    color:var(--ink);
  }
  .tagline{
    color:var(--muted);
    font-size:13.5px;
    line-height:1.55;
    margin:0;
    max-width:36ch;
  }

  .stat-num{
    font-family:'Source Serif 4', serif;
    font-weight:700;
    font-size:38px;
    line-height:1;
    color:var(--accent);
  }
  .stat-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--muted);
  }

  .add-label{
    font-family:'Inter', sans-serif;
    font-size:13.5px;
    font-weight:500;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .cell.-add:hover .add-label{ color:var(--accent-2); }

  .entry-date{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    color:var(--accent);
    margin-bottom:8px;
  }
  .entry-title{
    font-family:'Source Serif 4', serif;
    font-weight:600;
    font-size:20px;
    line-height:1.3;
    margin:0 0 8px;
    color:var(--ink);
  }
  .entry-title a{ text-decoration:none; color:var(--ink); }
  .entry-title a:hover{ color:var(--accent-2); }
  .entry-title a:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .entry-excerpt{
    color:var(--muted);
    font-size:14px;
    line-height:1.6;
    margin:0;
  }

  .entry-actions{
    margin-top:auto;
    padding-top:10px;
    display:flex;
    gap:12px;
  }
  .entry-actions button{
    background:none; border:none; padding:0;
    font-family:'Inter', sans-serif;
    font-size:11.5px;
    font-weight:500;
    cursor:pointer;
    color:var(--accent-2);
  }
  .entry-actions button:hover{ text-decoration:underline; }
  .entry-actions button.danger{ color:var(--muted); }
  .entry-actions button.danger:hover{ color:var(--danger); }

  .empty-cell{
    padding:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--muted);
    font-size:13.5px;
  }

  /* ---------- Non-grid panels (form / detail) ---------- */
  .panel-block{
    background:var(--glass-strong);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);
    box-shadow:0 8px 32px rgba(4,10,20,0.28);
    border-radius:var(--radius);
    padding:28px;
    animation:fadeIn .3s ease both;
  }

  .back-row{ margin-bottom:20px; }

  .text-link{
    background:none; border:none; padding:0;
    font-family:'Inter', sans-serif;
    font-size:13.5px;
    font-weight:500;
    color:var(--accent-2);
    cursor:pointer;
    border-bottom:1px solid transparent;
  }
  .text-link:hover{ border-color:var(--accent-2); }
  .text-link:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .field{ margin-bottom:20px; }
  .field label{
    display:block;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:7px;
  }
  .field input, .field textarea{
    width:100%;
    background:rgba(255,255,255,0.05);
    border:none;
    border-bottom:1px solid var(--glass-border);
    color:var(--ink);
    font-family:'Inter', sans-serif;
    font-size:15px;
    padding:10px 12px;
    border-radius:8px 8px 0 0;
    resize:vertical;
  }
  .field textarea{ min-height:220px; line-height:1.7; }
  .field input::placeholder, .field textarea::placeholder{ color:rgba(244,242,236,0.35); }
  .field input:focus, .field textarea:focus{ outline:none; border-color:var(--accent-2); }

  .btn{
    font-family:'Inter', sans-serif;
    font-size:13.5px;
    font-weight:600;
    padding:10px 18px;
    border:1px solid var(--accent);
    background:var(--accent);
    color:#20160A;
    border-radius:10px;
    cursor:pointer;
    transition:opacity .15s ease, transform .15s ease;
  }
  .btn:hover{ opacity:0.88; transform:translateY(-1px); }
  .btn:focus-visible{ outline:2px solid var(--accent-2); outline-offset:2px; }
  .btn.ghost{
    background:rgba(255,255,255,0.05);
    color:var(--ink);
    border-color:var(--glass-border);
  }
  .btn.ghost:hover{ border-color:var(--ink); opacity:1; transform:none; }

  .form-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:24px; }

  .detail-date{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.04em;
    color:var(--accent);
    text-transform:uppercase;
    margin-bottom:14px;
  }
  .detail-title{
    font-family:'Source Serif 4', serif;
    font-size:clamp(24px,4vw,30px);
    font-weight:700;
    line-height:1.3;
    margin:0 0 24px;
    color:var(--ink);
  }
  .detail-body{
    font-size:16px;
    line-height:1.8;
    color:rgba(244,242,236,0.88);
    white-space:pre-wrap;
  }

  .status{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--muted);
    padding:12px 0;
  }
  .status.error{ color:var(--danger); }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(3px); }
    to{ opacity:1; transform:translateY(0); }
  }

  @media (max-width:460px){
    .wrap{ padding:40px 16px 80px; }
    .cell.-stat{ flex-direction:column; align-items:flex-start; gap:6px; }
  }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
(function(){
  const app = document.getElementById('app');
  let entries = [];
  let route = { view: 'list' };
  let loaded = false;

  const SEED = [
    {
      id: 'seed-1',
      title: 'Why ETL still means something in an ELT world',
      excerpt: 'A quick note on when to transform before load, and when warehouse compute makes that decision for you.',
      body: "Most modern warehouses are fast enough to make ELT the default. Load raw first, transform inside the warehouse, let compute do the heavy lifting.\n\nBut ETL isn't dead, it just moved. Anything with PII masking, currency normalization across regions, or strict schema contracts for downstream systems still benefits from transforming before it lands.\n\nThe real skill isn't picking ETL or ELT as a religion. It's knowing which parts of a pipeline need governance at the gate versus flexibility after landing.",
      date: '2026-07-01'
    },
    {
      id: 'seed-2',
      title: 'Medallion architecture, in one paragraph',
      excerpt: 'Bronze, Silver, Gold, what each layer is actually responsible for, without the marketing gloss.',
      body: "Bronze holds raw data, untouched, exactly as it arrived. It's the source of truth if anything downstream breaks.\n\nSilver is where you clean, dedupe, and conform types. It's a layer analysts shouldn't fully trust yet, but engineers rely on daily.\n\nGold is curated and modeled for consumption, star schemas, marts, whatever the BI layer expects.\n\nThe layer names matter less than the discipline: never let a downstream consumer read from a layer that hasn't earned that level of trust.",
      date: '2026-06-24'
    },
    {
      id: 'seed-3',
      title: 'Idempotency is the whole game',
      excerpt: 'A pipeline that can safely re-run is worth more than one that runs fast.',
      body: "Backfills happen. Jobs fail halfway. Someone re-triggers a DAG by accident. If a rerun can duplicate or corrupt data, the pipeline isn't done yet.\n\nMERGE over INSERT, watermark columns, and deterministic keys are boring, but they're what let you sleep through a 2am retry.",
      date: '2026-06-18'
    }
  ];

  function loadEntries(){
    // Note: this posts list is currently static seed data. Once the
    // Supabase database is connected, this will fetch real entries
    // from the database instead.
    entries = SEED;
    loaded = true;
    render();
  }

  function fmtDate(d){
    try{
      return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { year:'numeric', month:'short', day:'2-digit' });
    }catch(e){ return d; }
  }

  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function go(newRoute){
    route = newRoute;
    window.scrollTo({ top:0, behavior:'auto' });
    render();
  }

  function render(){
    if (!loaded){
      app.innerHTML = '<div class="status">Loading…</div>';
      return;
    }
    if (route.view === 'detail'){ return renderDetail(route.id); }
    return renderList();
  }

  function renderList(){
    const sorted = [...entries].sort((a,b) => (a.date < b.date ? 1 : -1));

    const headerCell = `
      <div class="cell -header">
        <div>
          <h1 class="wordmark">Data Engineer Diaries</h1>
          <p class="tagline">Notes on pipelines, warehouses, and the small decisions that make data engineering hard.</p>
        </div>
      </div>
    `;

    const statCell = `
      <div class="cell -stat">
        <span class="stat-label">Logged</span>
        <div>
          <span class="stat-num">${entries.length.toString().padStart(2,'0')}</span>
          <span class="stat-label">${entries.length === 1 ? 'entry' : 'entries'}</span>
        </div>
      </div>
    `;

    const entryCells = sorted.map((e) => `
      <article class="cell -entry">
        <div class="entry-date">${fmtDate(e.date)}</div>
        <h2 class="entry-title"><a href="#" data-open="${e.id}">${escapeHtml(e.title)}</a></h2>
        <p class="entry-excerpt">${escapeHtml(e.excerpt || '')}</p>
        <div class="entry-actions">
          <button data-open="${e.id}">Read</button>
        </div>
      </article>
    `).join('');

    app.innerHTML = `
      <div class="bento">
        ${headerCell}
        ${statCell}
        ${sorted.length ? entryCells : '<div class="empty-cell">No entries yet.</div>'}
      </div>
    `;

    app.querySelectorAll('[data-open]').forEach(el => {
      el.addEventListener('click', (ev) => {
        ev.preventDefault();
        go({ view:'detail', id: el.getAttribute('data-open') });
      });
    });
  }

  function renderDetail(id){
    const e = entries.find(x => x.id === id);
    if (!e){ return go({ view:'list' }); }
    app.innerHTML = `
      <div class="back-row">
        <button class="text-link" id="back-btn">← All entries</button>
      </div>
      <div class="panel-block">
        <div class="detail-date">${fmtDate(e.date)}</div>
        <h2 class="detail-title">${escapeHtml(e.title)}</h2>
        <div class="detail-body">${escapeHtml(e.body)}</div>
      </div>
    `;
    document.getElementById('back-btn').addEventListener('click', () => go({ view:'list' }));
  }



  loadEntries();
})();
</script>
</body>
</html>
